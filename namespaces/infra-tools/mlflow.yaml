apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: infra-tools
spec:
  project: default
  source:
    repoURL: https://community-charts.github.io/helm-charts
    chart: mlflow
    targetRevision: 1.6.2
    helm:
      releaseName: mlflow
      valuesObject:
        service:
          type: ClusterIP
          port: 5000

        auth:
          enabled: false

        # Вимикаємо вбудований Postgres, бо використовуємо зовнішній
        postgresql:
          enabled: false

        # ✅ Отримуємо всі параметри безпечно з раніше створеного Secret (наприклад, mlflow-secret)
        extraEnv:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: mlflow-secret
                key: AWS_ACCESS_KEY_ID
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: mlflow-secret
                key: AWS_SECRET_ACCESS_KEY
          - name: MLFLOW_S3_ENDPOINT_URL
            valueFrom:
              secretKeyRef:
                name: mlflow-secret
                key: MLFLOW_S3_ENDPOINT_URL
          - name: MLFLOW_BACKEND_STORE_URI
            valueFrom:
              secretKeyRef:
                name: mlflow-secret
                key: MLFLOW_BACKEND_STORE_URI
          - name: MLFLOW_ARTIFACT_ROOT
            valueFrom:
              secretKeyRef:
                name: mlflow-secret
                key: MLFLOW_ARTIFACT_ROOT

        # Передаємо зчитані змінні середовища в аргументи запуску сервера
        extraArgs:
          backend-store-uri: "$(MLFLOW_BACKEND_STORE_URI)"
          default-artifact-root: "$(MLFLOW_ARTIFACT_ROOT)"
          host: "0.0.0.0"
          port: "5000"

  destination:
    namespace: mlflow # ✅ Змінено на mlflow згідно з інструкцією
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # ✅ Додано, щоб ArgoCD сам створив namespace mlflow, якщо його немає
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true